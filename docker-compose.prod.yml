name: vk-ai-aggregator-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vk_ai_aggregator}
      POSTGRES_USER: ${POSTGRES_USER:-vk_ai_aggregator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    image: vk-ai-aggregator-migrate:${IMAGE_TAG:-prod}
    build:
      context: .
      dockerfile: Dockerfile.migrate
    restart: "no"
    env_file:
      - ${APP_ENV_FILE:?APP_ENV_FILE is required}
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      MIGRATIONS_DIR: ${MIGRATIONS_DIR:-migrations}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    image: vk-ai-aggregator-api:${IMAGE_TAG:-prod}
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:?APP_ENV_FILE is required}
    environment:
      APP_ENV: production
      HTTP_ADDR: :8080
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_USE_SSL: ${S3_USE_SSL:-false}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    image: vk-ai-aggregator-worker:${IMAGE_TAG:-prod}
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:?APP_ENV_FILE is required}
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      WORKER_METRICS_ADDR: :9090
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  provider-webhook:
    image: vk-ai-aggregator-provider-webhook:${IMAGE_TAG:-prod}
    build:
      context: .
      dockerfile: Dockerfile.provider-webhook
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:?APP_ENV_FILE is required}
    environment:
      APP_ENV: production
      PAYMENT_WEBHOOK_ADDR: :8082
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_USE_SSL: ${S3_USE_SSL:-false}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  miniapp:
    image: vk-ai-aggregator-miniapp:${IMAGE_TAG:-prod}
    build:
      context: .
      dockerfile: Dockerfile.miniapp
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  reverse-proxy:
    image: nginx:1.29-alpine
    restart: unless-stopped
    volumes:
      - ./deployments/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      provider-webhook:
        condition: service_healthy
      miniapp:
        condition: service_healthy
    ports:
      - "127.0.0.1:${REVERSE_PROXY_HTTP_PORT:-8088}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/proxy-health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles:
      - cloudflare
    command:
      - tunnel
      - --no-autoupdate
      - --loglevel
      - info
      - --metrics
      - 0.0.0.0:2000
      - run
      - --token
      - ${CLOUDFLARED_TUNNEL_TOKEN}
    depends_on:
      reverse-proxy:
        condition: service_healthy
    ports:
      - "127.0.0.1:${CLOUDFLARED_METRICS_PORT:-2000}:2000"
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3

  backup-postgres:
    image: vk-ai-aggregator-backup:${BACKUP_IMAGE_TAG:-prod}
    build:
      context: .
      dockerfile: Dockerfile.backup
    restart: "no"
    profiles:
      - backup
    env_file:
      - ${APP_ENV_FILE:?APP_ENV_FILE is required}
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      BACKUP_DIR: /backups
      BACKUP_TEXTFILE_DIR: /backup-metrics
      BACKUP_POSTGRES_ENABLED: ${BACKUP_POSTGRES_ENABLED:-true}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - backup_data:/backups
      - backup_metrics:/backup-metrics
    depends_on:
      postgres:
        condition: service_healthy
    command: ["/app/scripts/backup/backup-postgres.sh"]

  backup-minio:
    image: vk-ai-aggregator-backup:${BACKUP_IMAGE_TAG:-prod}
    build:
      context: .
      dockerfile: Dockerfile.backup
    restart: "no"
    profiles:
      - backup
    env_file:
      - ${APP_ENV_FILE:?APP_ENV_FILE is required}
    environment:
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_BUCKET: ${S3_BUCKET:-artifacts}
      BACKUP_DIR: /backups
      BACKUP_TEXTFILE_DIR: /backup-metrics
      BACKUP_MINIO_ENABLED: ${BACKUP_MINIO_ENABLED:-true}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - backup_data:/backups
      - backup_metrics:/backup-metrics
    depends_on:
      minio:
        condition: service_healthy
    command: ["/app/scripts/backup/backup-minio.sh"]

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backup_data:
  backup_metrics:

networks:
  default:
    name: ${COMPOSE_NETWORK_NAME:-vk-ai-aggregator-prod}
