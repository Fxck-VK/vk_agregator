name: vk-ai-aggregator-prod

services:
  migrate:
    image: ${APP_IMAGE_REGISTRY:-ghcr.io/fxck-vk/vk_agregator}/migrate:${IMAGE_TAG:-main}
    build:
      context: .
      dockerfile: Dockerfile.migrate
    restart: "no"
    env_file:
      - ${APP_ENV_FILE:?APP_ENV_FILE is required}
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      MIGRATIONS_DIR: ${MIGRATIONS_DIR:-migrations}

  api:
    image: ${APP_IMAGE_REGISTRY:-ghcr.io/fxck-vk/vk_agregator}/api:${IMAGE_TAG:-main}
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:?APP_ENV_FILE is required}
    environment:
      APP_ENV: ${APP_ENV:-production}
      HTTP_ADDR: :8080
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ADDRESSING_STYLE: ${S3_ADDRESSING_STYLE:-path}
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    image: ${APP_IMAGE_REGISTRY:-ghcr.io/fxck-vk/vk_agregator}/worker:${IMAGE_TAG:-main}
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:?APP_ENV_FILE is required}
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ADDRESSING_STYLE: ${S3_ADDRESSING_STYLE:-path}
      WORKER_MODE: jobs
      WORKER_METRICS_ADDR: :9090
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/readyz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  maintenance-worker:
    image: ${APP_IMAGE_REGISTRY:-ghcr.io/fxck-vk/vk_agregator}/worker:${IMAGE_TAG:-main}
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:?APP_ENV_FILE is required}
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ADDRESSING_STYLE: ${S3_ADDRESSING_STYLE:-path}
      WORKER_MODE: maintenance
      WORKER_CONSUMER: maintenance-1
      WORKER_METRICS_ADDR: :9091
    ports:
      - "127.0.0.1:9091:9091"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9091/readyz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  provider-webhook:
    image: ${APP_IMAGE_REGISTRY:-ghcr.io/fxck-vk/vk_agregator}/provider-webhook:${IMAGE_TAG:-main}
    build:
      context: .
      dockerfile: Dockerfile.provider-webhook
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:?APP_ENV_FILE is required}
    environment:
      APP_ENV: ${APP_ENV:-production}
      PAYMENT_WEBHOOK_ADDR: :8082
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ADDRESSING_STYLE: ${S3_ADDRESSING_STYLE:-path}
    ports:
      - "127.0.0.1:8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/readyz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  provider-balance-bot:
    image: ${APP_IMAGE_REGISTRY:-ghcr.io/fxck-vk/vk_agregator}/provider-balance-bot:${IMAGE_TAG:-main}
    build:
      context: .
      dockerfile: Dockerfile.provider-balance-bot
    restart: on-failure
    profiles:
      - provider-balance
    env_file:
      - ${APP_ENV_FILE:?APP_ENV_FILE is required}
    environment:
      APP_ENV: ${APP_ENV:-production}
      PROVIDER_BALANCE_BOT_ENABLED: ${PROVIDER_BALANCE_BOT_ENABLED:-false}
      PROVIDER_BALANCE_POLL_INTERVAL: ${PROVIDER_BALANCE_POLL_INTERVAL:-15m}
      APIMART_BALANCE_WARN_REMAIN_BALANCE: ${APIMART_BALANCE_WARN_REMAIN_BALANCE:-20}
      APIMART_BALANCE_WARN_REMAIN_CREDITS: ${APIMART_BALANCE_WARN_REMAIN_CREDITS:-200}

  miniapp:
    image: ${APP_IMAGE_REGISTRY:-ghcr.io/fxck-vk/vk_agregator}/miniapp:${IMAGE_TAG:-main}
    build:
      context: .
      dockerfile: Dockerfile.miniapp
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  reverse-proxy:
    image: nginx:1.29-alpine
    restart: unless-stopped
    volumes:
      - ./deployments/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      provider-webhook:
        condition: service_healthy
      miniapp:
        condition: service_healthy
    ports:
      - "127.0.0.1:${REVERSE_PROXY_HTTP_PORT:-8088}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/proxy-health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    network_mode: host
    profiles:
      - cloudflare
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN:?CLOUDFLARED_TUNNEL_TOKEN is required}
    command:
      - tunnel
      - --no-autoupdate
      - --loglevel
      - info
      - --metrics
      - 127.0.0.1:${CLOUDFLARED_METRICS_PORT:-2000}
      - run
    depends_on:
      reverse-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3

  backup-postgres:
    image: ${APP_IMAGE_REGISTRY:-ghcr.io/fxck-vk/vk_agregator}/backup:${BACKUP_IMAGE_TAG:-main}
    build:
      context: .
      dockerfile: Dockerfile.backup
    restart: "no"
    profiles:
      - backup
    env_file:
      - ${APP_ENV_FILE:?APP_ENV_FILE is required}
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      BACKUP_DIR: /backups
      BACKUP_TEXTFILE_DIR: /backup-metrics
      BACKUP_POSTGRES_ENABLED: ${BACKUP_POSTGRES_ENABLED:-true}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - backup_data:/backups
      - backup_metrics:/backup-metrics
    command: ["/app/scripts/backup/backup-postgres.sh"]

  backup-minio:
    image: ${APP_IMAGE_REGISTRY:-ghcr.io/fxck-vk/vk_agregator}/backup:${BACKUP_IMAGE_TAG:-main}
    build:
      context: .
      dockerfile: Dockerfile.backup
    restart: "no"
    profiles:
      - backup
    env_file:
      - ${APP_ENV_FILE:?APP_ENV_FILE is required}
    environment:
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_BUCKET: ${S3_BUCKET:-artifacts}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ADDRESSING_STYLE: ${S3_ADDRESSING_STYLE:-path}
      BACKUP_DIR: /backups
      BACKUP_TEXTFILE_DIR: /backup-metrics
      BACKUP_MINIO_ENABLED: ${BACKUP_MINIO_ENABLED:-true}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - backup_data:/backups
      - backup_metrics:/backup-metrics
    command: ["/app/scripts/backup/backup-minio.sh"]

  restore-postgres:
    image: ${APP_IMAGE_REGISTRY:-ghcr.io/fxck-vk/vk_agregator}/backup:${BACKUP_IMAGE_TAG:-main}
    build:
      context: .
      dockerfile: Dockerfile.backup
    restart: "no"
    profiles:
      - backup
    env_file:
      - ${APP_ENV_FILE:?APP_ENV_FILE is required}
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      BACKUP_DIR: /backups
      RESTORE_ALLOW_DESTRUCTIVE: ${RESTORE_ALLOW_DESTRUCTIVE:-false}
      RESTORE_CONFIRM: ${RESTORE_CONFIRM:-}
      RESTORE_POSTGRES_FILE: ${RESTORE_POSTGRES_FILE:-}
      RESTORE_SKIP_PRE_BACKUP: ${RESTORE_SKIP_PRE_BACKUP:-false}
    volumes:
      - backup_data:/backups
    command: ["/app/scripts/backup/restore-postgres.sh"]

  restore-minio:
    image: ${APP_IMAGE_REGISTRY:-ghcr.io/fxck-vk/vk_agregator}/backup:${BACKUP_IMAGE_TAG:-main}
    build:
      context: .
      dockerfile: Dockerfile.backup
    restart: "no"
    profiles:
      - backup
    env_file:
      - ${APP_ENV_FILE:?APP_ENV_FILE is required}
    environment:
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_BUCKET: ${S3_BUCKET:-artifacts}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ADDRESSING_STYLE: ${S3_ADDRESSING_STYLE:-path}
      BACKUP_DIR: /backups
      RESTORE_ALLOW_DESTRUCTIVE: ${RESTORE_ALLOW_DESTRUCTIVE:-false}
      RESTORE_CONFIRM: ${RESTORE_CONFIRM:-}
      RESTORE_MINIO_DIR: ${RESTORE_MINIO_DIR:-}
      RESTORE_MINIO_DELETE: ${RESTORE_MINIO_DELETE:-false}
    volumes:
      - backup_data:/backups
    command: ["/app/scripts/backup/restore-minio.sh"]

volumes:
  backup_data:
  backup_metrics:

networks:
  default:
    name: ${COMPOSE_NETWORK_NAME:-vk-ai-aggregator-prod}
