worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Do not log query strings: VK launch params, callback payload hints and
    # payment identifiers must not leak into reverse-proxy logs.
    log_format main '$remote_addr $host "$request_method $uri" '
                    '$status $body_bytes_sent $request_time';
    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    server_tokens off;
    sendfile on;
    keepalive_timeout 65s;
    client_max_body_size 50m;

    proxy_http_version 1.1;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    upstream api {
        server api:8080;
        keepalive 32;
    }

    upstream provider_webhook {
        server provider-webhook:8082;
        keepalive 8;
    }

    upstream miniapp_frontend {
        server miniapp:80;
        keepalive 16;
    }

    server {
        listen 80 default_server;
        server_name _;

        location = /proxy-health {
            access_log off;
            return 200 "ok\n";
        }

        return 444;
    }

    server {
        listen 80;
        server_name vk.neiirohub.ru;

        location = /webhooks/vk {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Connection "";
            proxy_pass http://api;
        }

        location = /health {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Connection "";
            proxy_pass http://api;
        }

        location = /billing/webhooks/yookassa {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Forwarded "proto=https;host=$host";
            proxy_set_header CF-Visitor $http_cf_visitor;
            proxy_set_header Connection "";
            proxy_pass http://provider_webhook;
        }

        location ~ ^/(admin|metrics|debug|billing)(/|$) {
            return 404;
        }

        location / {
            return 404;
        }
    }

    server {
        listen 80;
        server_name neiirohub.ru;

        location = /billing/webhooks/yookassa {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Forwarded "proto=https;host=$host";
            proxy_set_header CF-Visitor $http_cf_visitor;
            proxy_set_header Connection "";
            proxy_pass http://provider_webhook;
        }

        location / {
            return 404;
        }
    }

    server {
        listen 80;
        server_name app.neiirohub.ru;

        location ^~ /miniapp/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Connection "";
            proxy_pass http://api;
        }

        location ~ ^/(admin|metrics|debug|webhooks|billing|health|healthz)(/|$) {
            return 404;
        }

        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Connection "";
            proxy_pass http://miniapp_frontend;
        }
    }
}
