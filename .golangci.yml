version: "2"

run:
  timeout: 5m
  relative-path-mode: gomod
  tests: true

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - unused
  exclusions:
    paths:
      - web/admin/node_modules
      - web/miniapp/node_modules

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
