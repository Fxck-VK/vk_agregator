groups:
  - name: product-statistics
    rules:
      - record: product:job_success_ratio:30m
        expr: |
          sum(increase(vkagg_product_events_total{journey="job",step="terminal",result="succeeded"}[30m]))
            /
          clamp_min(sum(increase(vkagg_product_events_total{journey="job",step="terminal"}[30m])), 1)

      - record: product:frontend_api_latency_p95:5m
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(vkagg_product_frontend_api_duration_seconds_bucket[5m])) by (le)
          )

      - record: product:prompt_length_p95:15m
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(vkagg_product_prompt_length_chars_bucket[15m])) by (le)
          )

      - record: product:provider_latency_p95:5m
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(vkagg_provider_request_duration_seconds_bucket[5m])) by (le, provider, model, operation)
          )

      - record: product:worker_task_duration_p95:5m
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(vkagg_worker_task_duration_seconds_bucket[5m])) by (le, phase, operation, modality, result)
          )

      - record: product:job_duration_p95:30m
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(vkagg_job_duration_seconds_bucket[30m])) by (le, operation, modality, status)
          )

      - record: product:payment_to_ledger_p95:30m
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(vkagg_payment_to_ledger_duration_seconds_bucket[30m])) by (le, provider)
          )

      - alert: ProductJobSuccessRateLow
        expr: |
          product:job_success_ratio:30m < 0.95
            and
          sum(increase(vkagg_product_events_total{journey="job",step="terminal"}[30m])) > 10
        for: 10m
        labels:
          severity: critical
          surface: product
        annotations:
          summary: Низкая доля успешных генераций
          description: За последние 30 минут больше 10 jobs дошли до terminal state, но доля succeeded ниже 95%.
          impact: Пользователи VK Bot или Mini App создают jobs, но заметная часть не получает успешный результат.
          dashboard: Grafana -> Product Observability / Product Statistics, Jobs Worker, Providers
          action: Проверь Product Statistics success ratio, затем Jobs Worker DLQ/retry, Providers error/rate-limit и delivery failures. Не меняй баланс вручную; billing исправляй только ledger-safe путем.
          safe_logs: В чат отправляй только surface, operation, modality, result, error_class и counts. Не отправляй prompts, job_id, user_id, raw provider payloads или private artifact URLs.

      - alert: ProductTrafficWithoutSuccessfulJobs
        expr: |
          sum(increase(vkagg_product_active_user_events_total[2h])) > 5
            and
          sum(increase(vkagg_product_events_total{journey="job",step="terminal",result="succeeded"}[2h])) == 0
        for: 10m
        labels:
          severity: critical
          surface: product
        annotations:
          summary: Есть создание jobs, но нет успешных результатов
          description: За 2 часа появились active-user job events, но не было ни одного terminal succeeded.
          impact: >
            Основной пользовательский путь может быть сломан: пользователи запускают генерации, но не получают результат.
          dashboard: Grafana -> Product Observability / Product Statistics, Jobs Worker
          action: Проверь worker, queue age, DLQ, provider availability, moderation rejects и delivery. Начинай с последнего deploy/config change и состояния Redis/Postgres.
          safe_logs: Можно отправлять только aggregate counts, statuses и sanitized error_class. Нельзя отправлять prompts, launch params, job/user ids, provider responses, artifact URLs.

      - alert: ProductFrontendApiLatencyHigh
        expr: product:frontend_api_latency_p95:5m > 2
        for: 10m
        labels:
          severity: warning
          surface: miniapp
        annotations:
          summary: Mini App видит медленные API ответы
          description: Клиентская p95 latency по безопасным route templates выше 2 секунд.
          impact: Пользовательский путь в Mini App ощущается медленным; пользователи могут повторять действия и создавать лишнюю нагрузку.
          dashboard: Grafana -> Product Observability / Product Statistics, Mini App Frontend, Product Health
          action: Найди route/status в Product Statistics, затем проверь API latency, Postgres/Redis, queue pressure и browser console error class.
          safe_logs: Отправляй route template, status и latency bucket. Не отправляй full URL, launch params, request body, prompts, cookies или user ids.

      - alert: ProductPaymentIntentErrorSpike
        expr: |
          sum(increase(vkagg_product_events_total{journey="payment",step="intent_create",result=~"error|provider_error|invalid_product|forbidden"}[10m])) > 3
        for: 5m
        labels:
          severity: critical
          surface: payments
        annotations:
          summary: Ошибки создания платежных intent выросли
          description: За 10 минут несколько payment intent create завершились ошибкой.
          impact: Пользователи могут не пополнить баланс, а jobs могут оставаться в awaiting_payment.
          dashboard: Grafana -> Product Observability / Product Statistics, Payments Billing
          action: Проверь active payment products, provider-webhook/API health, YooKassa adapter errors и receipt contact validation. Не начисляй кредиты по frontend redirect.
          safe_logs: В чат можно отправлять source/result counts и provider operation error_class. Нельзя отправлять YooKassa payload, Basic Auth, shop secret, payment_id, user_id или receipt contacts.

      - alert: ProductPromptLengthVeryHigh
        expr: product:prompt_length_p95:15m > 8000
        for: 15m
        labels:
          severity: warning
          surface: product
        annotations:
          summary: p95 длины prompt слишком высокий
          description: Агрегированный p95 prompt length выше 8000 символов без сохранения самих prompt text.
          impact: Длинные запросы могут повышать стоимость, latency, rate-limit риск и нагрузку на moderation/provider path.
          dashboard: Grafana -> Product Observability / Product Statistics, Providers
          action: Проверь, не идет ли abuse/автоматический спам; при необходимости ужесточи лимиты длины prompt или rate limits по surface/modality.
          safe_logs: Отправляй только buckets/counts и surface/operation/modality. Не отправляй prompt text, launch params, user ids или provider request body.
      - alert: ProductProviderLatencyHigh
        expr: product:provider_latency_p95:5m > 60
        for: 10m
        labels:
          severity: warning
          surface: providers
        annotations:
          summary: AI provider отвечает медленно
          description: p95 latency provider call выше 60 секунд по provider/model/operation.
          impact: Jobs могут дольше ждать в worker queues, копить очередь и уходить в retry/fallback.
          dashboard: Grafana -> Product Observability / Providers, Jobs Worker
          action: Проверь provider latency по provider/model/operation, rate limits, fallback chain, circuit breaker и queue oldest age. Provider calls должны оставаться только в worker/provider adapters.
          safe_logs: В чат отправляй только provider, model, operation, latency bucket и error_class. Не отправляй prompts, raw provider payloads, API keys или private media URLs.

      - alert: ProductWorkerRetriesSpike
        expr: sum(increase(vkagg_worker_retries_total[10m])) > 5
        for: 5m
        labels:
          severity: warning
          surface: worker
        annotations:
          summary: Worker retries заметно выросли
          description: За 10 минут worker принял больше 5 retry decisions.
          impact: Jobs могут выполняться медленнее, queues могут расти, exhausted tasks могут доходить до DLQ.
          dashboard: Grafana -> Product Observability / Jobs Worker, Providers
          action: Проверь retries by phase/operation/modality, provider errors/rate limits, scanner/moderation errors, Redis health и последние config/deploy changes.
          safe_logs: В чат отправляй только phase, operation, modality, counts и sanitized error_class. Не отправляй job_id, user_id, prompts, provider payloads или private artifact URLs.

      - alert: ProductVKDeliveryErrors
        expr: sum(increase(vkagg_vk_delivery_attempts_total{result="error"}[10m])) > 3
        for: 5m
        labels:
          severity: warning
          surface: vk_bot
        annotations:
          summary: Ошибки VK delivery выросли
          description: За 10 минут несколько VK delivery attempts завершились error.
          impact: Пользователи VK Bot могут не получать результаты, даже если job/provider path успешно завершился.
          dashboard: Grafana -> Product Observability / VK Bot, Jobs Worker
          action: Проверь kind/result/error_class, VK API availability, delivery token presence, media upload path и artifact access. Не переотправляй без проверки idempotent delivery.
          safe_logs: В чат отправляй только kind, result, error_class и counts. Не отправляй VK access token, peer/user id, private artifact URL или raw VK response.

      - alert: ProductPaymentToLedgerSlow
        expr: |
          product:payment_to_ledger_p95:30m > 300
            and on(provider)
          sum(rate(vkagg_payment_to_ledger_duration_seconds_count[30m])) by (provider) > 0
        for: 10m
        labels:
          severity: critical
          surface: payments
        annotations:
          summary: Payment success медленно доходит до ledger top-up
          description: p95 от payment intent creation до committed ledger top-up выше 5 минут.
          impact: Пользователь мог успешно оплатить, но credits еще не доступны на балансе.
          dashboard: Grafana -> Product Observability / Payments Billing
          action: Проверь provider-webhook readyz, payment_events backlog, reconciliation, provider GetPayment errors и DB latency. Credits начисляй только через provider-verified ledger top-up path.
          safe_logs: В чат отправляй только provider, duration bucket и backlog count. Не отправляй payment_id, user_id, YooKassa payload, auth headers, receipt contacts или credentials.

      - alert: ProductSecurityFailuresSpike
        expr: |
          sum(increase(vkagg_auth_failures_total[10m]))
            +
          sum(increase(vkagg_signature_failures_total[10m])) > 10
        for: 5m
        labels:
          severity: critical
          surface: security
        annotations:
          summary: Auth/signature failures выросли
          description: За 10 минут на protected surfaces много auth или signature failures.
          impact: Это может быть сломанный env/config, атакующий трафик, сломанный VK launch signature flow или неверное использование admin token.
          dashboard: Grafana -> Product Observability / Security Config
          action: Проверь failures by surface/reason, VK_APP_SECRET/config presence, admin token usage, forwarding headers и recent deploy. Не ослабляй auth или signature checks.
          safe_logs: В чат отправляй только surface, reason и counts. Не отправляй admin token, launch params, cookies, auth headers или user ids.

      - alert: ProductReferralRewardErrors
        expr: sum(increase(vkagg_referral_rewards_total{result=~"service_unavailable|error"}[10m])) > 0
        for: 5m
        labels:
          severity: warning
          surface: referrals
        annotations:
          summary: Referral flow возвращает service/error outcomes
          description: Referral registration/activation/reward path вернул service_unavailable или error.
          impact: Приглашения могут не активироваться или rewards могут не записаться через billing ledger.
          dashboard: Grafana -> Product Observability / Product Statistics, Security Config
          action: Проверь referral result counts, referral repository health, ledger reward path и idempotency. Не начисляй bonus вручную мимо billing ledger.
          safe_logs: В чат отправляй только result и counts. Не отправляй referral_code, vk_user_id, internal UUID или списки invited users.
