groups:
  - name: product-health
    rules:
      - alert: ApiDown
        expr: up{job="api"} == 0
        for: 30s
        labels:
          severity: critical
          surface: api
        annotations:
          summary: API metrics endpoint is down
          description: Prometheus cannot scrape the API /metrics endpoint.

      - alert: WorkerDown
        expr: up{job="worker"} == 0
        for: 30s
        labels:
          severity: critical
          surface: worker
        annotations:
          summary: Worker metrics endpoint is down
          description: Prometheus cannot scrape WORKER_METRICS_ADDR /metrics.

      - alert: ProviderWebhookDown
        expr: up{job="provider-webhook"} == 0
        for: 30s
        labels:
          severity: critical
          surface: payments
        annotations:
          summary: Provider webhook service metrics endpoint is down
          description: Prometheus cannot scrape provider-webhook /metrics.

      - alert: MiniAppLocalProbeDown
        expr: probe_success{job="blackbox-local-health", instance="http://host.docker.internal:5173/"} == 0
        for: 1m
        labels:
          severity: warning
          surface: miniapp
        annotations:
          summary: Mini App local probe failed
          description: Vite/Mini App local URL did not return a 2xx response.

      - alert: PublicMetricsExposed
        expr: probe_success{job="blackbox-public-metrics"} == 1
        for: 30s
        labels:
          severity: critical
          surface: security
        annotations:
          summary: Public /metrics endpoint appears reachable
          description: A public metrics probe returned 2xx. Metrics endpoints must stay private.

      - alert: HighApiErrorRate
        expr: |
          sum(rate(vkagg_http_requests_total{code=~"5.."}[5m]))
            /
          clamp_min(sum(rate(vkagg_http_requests_total[5m])), 1) > 0.05
        for: 10m
        labels:
          severity: warning
          surface: api
        annotations:
          summary: API 5xx rate is above 5%
          description: More than 5% of instrumented HTTP requests returned 5xx for 10 minutes.

      - alert: ApiLatencyDegraded
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(vkagg_http_request_duration_seconds_bucket[5m])) by (le, route)
          ) > 0.5
        for: 10m
        labels:
          severity: warning
          surface: api
        annotations:
          summary: API p95 latency degraded
          description: p95 HTTP latency exceeded 500ms for an instrumented route.

  - name: jobs-workers
    rules:
      - alert: DLQNotEmpty
        expr: increase(vkagg_dlq_routed_total[5m]) > 0
        for: 0s
        labels:
          severity: critical
          surface: jobs
        annotations:
          summary: Task was routed to DLQ
          description: A worker task exhausted retries and was routed to the dead-letter queue.

      - alert: QueueOldestAgeHigh
        expr: vkagg_queue_oldest_age_seconds > 120
        for: 2m
        labels:
          severity: warning
          surface: jobs
        annotations:
          summary: Queue oldest task age is high
          description: A Redis stream has work older than 2 minutes.

      - alert: StuckJobsDetected
        expr: vkagg_stuck_jobs > 0
        for: 5m
        labels:
          severity: critical
          surface: jobs
        annotations:
          summary: Stuck jobs detected
          description: Jobs appear stuck in a non-terminal state.

  - name: payments-billing
    rules:
      - alert: BillingMismatch
        expr: vkagg_billing_mismatches > 0
        for: 0s
        labels:
          severity: critical
          surface: billing
        annotations:
          summary: Billing ledger mismatch detected
          description: Cached balance differs from committed ledger projection.

      - alert: PaymentWebhookBacklog
        expr: payment_webhook_oldest_unprocessed_age_seconds > 300
        for: 1m
        labels:
          severity: critical
          surface: payments
        annotations:
          summary: Payment webhook inbox is stuck
          description: The oldest unprocessed payment webhook is older than 5 minutes.

      - alert: PaymentReconciliationMismatch
        expr: payment_reconciliation_mismatches > 0
        for: 0s
        labels:
          severity: critical
          surface: payments
        annotations:
          summary: Payment reconciliation mismatch
          description: Provider state and local payment intent state do not match.

      - alert: PaymentProviderErrors
        expr: increase(payment_provider_errors_total[10m]) > 0
        for: 0s
        labels:
          severity: critical
          surface: payments
        annotations:
          summary: Payment provider API errors detected
          description: Payment provider API calls are failing.

      - alert: RefundRollbackFailed
        expr: increase(payment_refunds_total{result="rollback_failed"}[5m]) > 0
        for: 0s
        labels:
          severity: critical
          surface: payments
        annotations:
          summary: Refund rollback failed
          description: Provider refund and internal compensation both failed. Freeze manual refunds.

  - name: providers
    rules:
      - alert: ProviderErrorRateHigh
        expr: |
          sum(rate(vkagg_provider_errors_total[10m])) by (provider)
          /
          clamp_min(sum(rate(vkagg_provider_requests_total[10m])) by (provider), 1) > 0.05
        for: 10m
        labels:
          severity: warning
          surface: providers
        annotations:
          summary: Provider error rate is high
          description: Provider non-success rate exceeded 5% for 10 minutes.

      - alert: ProviderRateLimitDetected
        expr: increase(vkagg_provider_rate_limits_total[5m]) > 0
        for: 0s
        labels:
          severity: warning
          surface: providers
        annotations:
          summary: Provider rate limit detected
          description: A provider returned a rate-limit error.

      - alert: ProviderFallbackExhausted
        expr: increase(vkagg_provider_fallback_total{reason="exhausted"}[5m]) > 0
        for: 0s
        labels:
          severity: critical
          surface: providers
        annotations:
          summary: Provider fallback exhausted
          description: All configured providers failed for at least one request.

  - name: infra-backups
    rules:
      - alert: PostgresExporterDown
        expr: up{job="postgres-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          surface: infra
        annotations:
          summary: Postgres exporter is down
          description: Prometheus cannot scrape Postgres exporter.

      - alert: RedisExporterDown
        expr: up{job="redis-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          surface: infra
        annotations:
          summary: Redis exporter is down
          description: Prometheus cannot scrape Redis exporter.

      - alert: DiskSpaceWarning
        expr: |
          1 - (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}
              /
            node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}
          ) > 0.80
        for: 10m
        labels:
          severity: warning
          surface: infra
        annotations:
          summary: Disk usage above 80%
          description: Host disk usage is above warning threshold.

      - alert: DiskSpaceCritical
        expr: |
          1 - (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}
              /
            node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}
          ) > 0.90
        for: 5m
        labels:
          severity: critical
          surface: infra
        annotations:
          summary: Disk usage above 90%
          description: Host disk usage is above critical threshold.

      - alert: BackupStale
        expr: time() - vkagg_backup_last_success_timestamp > 86400
        for: 5m
        labels:
          severity: critical
          surface: backups
        annotations:
          summary: Latest backup is older than 24 hours
          description: Backup metrics report no successful backup in the last day.
