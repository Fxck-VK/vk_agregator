groups:
  - name: product-health
    rules:
      - alert: ApiDown
        expr: up{job="api"} == 0
        for: 30s
        labels:
          severity: critical
          surface: api
        annotations:
          summary: API не отдает метрики
          description: Prometheus не может прочитать API /metrics.
          impact: VK Bot, Mini App BFF, admin/operator API и health checks могут быть недоступны или не наблюдаться.
          dashboard: Grafana -> Product Observability / Product Health, API
          action: Проверь, запущен ли cmd/api; открой http://127.0.0.1:8080/healthz и http://127.0.0.1:8080/metrics; смотри .runtime/observability-dev/api-live.err.
          safe_logs: В чат отправляй только статус health, код ошибки и имя сервиса; не отправляй токены, headers, launch params, prompts или raw user data.

      - alert: WorkerDown
        expr: up{job="worker"} == 0
        for: 30s
        labels:
          severity: critical
          surface: worker
        annotations:
          summary: Worker не отдает метрики
          description: Prometheus не может прочитать WORKER_METRICS_ADDR /metrics.
          impact: Очереди jobs могут перестать обрабатываться, генерации и delivery могут зависнуть.
          dashboard: Grafana -> Product Observability / Jobs Worker
          action: Проверь, запущен ли cmd/worker; открой http://127.0.0.1:9090/healthz и http://127.0.0.1:9090/metrics; смотри .runtime/observability-dev/worker-live.err.
          safe_logs: В чат отправляй только статус worker, queue age и error class; не отправляй prompts, provider payloads, artifact URLs или ключи провайдеров.

      - alert: ProviderWebhookDown
        expr: up{job="provider-webhook"} == 0
        for: 30s
        labels:
          severity: critical
          surface: payments
        annotations:
          summary: Payment webhook service не отдает метрики
          description: Prometheus не может прочитать provider-webhook /metrics.
          impact: YooKassa webhook inbox и reconciliation могут не обрабатываться, пополнения могут зависнуть до восстановления сервиса.
          dashboard: Grafana -> Product Observability / Payments Billing
          action: Проверь cmd/provider-webhook; открой http://127.0.0.1:8082/readyz и /metrics; смотри .runtime/observability-dev/provider-webhook-live.err.
          safe_logs: Не отправляй raw YooKassa payload, Authorization, shop id, secret key, payment metadata или user identifiers.

      - alert: MiniAppLocalProbeDown
        expr: probe_success{job="blackbox-local-health", instance="http://host.docker.internal:5173/"} == 0
        for: 1m
        labels:
          severity: warning
          surface: miniapp
        annotations:
          summary: Локальная Mini App не отвечает
          description: Vite/Mini App local URL не вернул 2xx.
          impact: Локальная проверка Mini App и VK iframe могут не открываться.
          dashboard: Grafana -> Product Observability / Mini App Frontend
          action: Открой http://127.0.0.1:5173; проверь Vite process и .runtime/observability-dev/vite-live.err; затем проверь API proxy /miniapp/*.
          safe_logs: Можно отправить HTTP status и browser console error class; не отправляй full launch params, VK_APP_SECRET, user ids или cookies.

      - alert: PublicMetricsExposed
        expr: probe_success{job="blackbox-public-metrics"} == 1
        for: 30s
        labels:
          severity: critical
          surface: security
        annotations:
          summary: Публичный /metrics доступен снаружи
          description: Blackbox probe получил 2xx от публичного /metrics. Метрики должны оставаться приватными.
          impact: Внешний пользователь может увидеть внутренние labels, названия сервисов, счетчики ошибок и структуру продукта.
          dashboard: Grafana -> Product Observability / Security Config
          action: Срочно закрой публичный /metrics на Cloudflare/nginx/tunnel; оставь доступ только localhost/VPN/SSH tunnel; перепроверь https://app.neiirohub.ru/metrics и https://vk.neiirohub.ru/metrics.
          safe_logs: В чат отправляй только URL и HTTP status; не отправляй полный metrics output.

      - alert: HighApiErrorRate
        expr: |
          sum(rate(vkagg_http_requests_total{code=~"5.."}[5m]))
            /
          clamp_min(sum(rate(vkagg_http_requests_total[5m])), 1) > 0.05
        for: 10m
        labels:
          severity: warning
          surface: api
        annotations:
          summary: Доля API 5xx выше 5 процентов
          description: Больше 5 процентов instrumented HTTP requests возвращают 5xx в течение 10 минут.
          impact: Пользовательские сценарии VK Bot, Mini App, admin/operator API могут падать или деградировать.
          dashboard: Grafana -> Product Observability / Product Health, API
          action: Найди route с 5xx в Grafana; проверь api-live.err и зависимости Postgres/Redis/MinIO; начни с последних deploy/config изменений.
          safe_logs: Отправляй route, status code и sanitized error class; не отправляй request body, auth headers, prompts или launch params.

      - alert: ApiLatencyDegraded
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(vkagg_http_request_duration_seconds_bucket[5m])) by (le, route)
          ) > 0.5
        for: 10m
        labels:
          severity: warning
          surface: api
        annotations:
          summary: API p95 latency выше 500ms
          description: p95 latency instrumented HTTP route выше 500ms.
          impact: Mini App и bot control paths могут ощущаться медленными, часть клиентов может повторять запросы.
          dashboard: Grafana -> Product Observability / Product Health, API
          action: Найди медленный route; проверь Postgres/Redis latency, очередь jobs, внешние зависимости и recent logs.
          safe_logs: Отправляй route и latency bucket; не отправляй payload, PII, prompts или private artifact URLs.

  - name: jobs-workers
    rules:
      - alert: DLQNotEmpty
        expr: increase(vkagg_dlq_routed_total[5m]) > 0
        for: 0s
        labels:
          severity: critical
          surface: jobs
        annotations:
          summary: Задача ушла в DLQ
          description: Worker task исчерпал retries и был отправлен в dead-letter queue.
          impact: Конкретная генерация или delivery не завершились автоматически; пользователю может не прийти результат.
          dashboard: Grafana -> Product Observability / Jobs Worker
          action: Проверь phase в DLQ dashboard, worker-live.err и соответствующий error class; исправь причину и реши, можно ли безопасно переобработать задачу.
          safe_logs: Отправляй phase, operation, modality, error class; не отправляй prompt, raw provider response, artifact URL или user id.

      - alert: QueueOldestAgeHigh
        expr: vkagg_queue_oldest_age_seconds > 120
        for: 2m
        labels:
          severity: warning
          surface: jobs
        annotations:
          summary: Самая старая задача в очереди старше 2 минут
          description: В Redis stream есть работа старше 2 минут.
          impact: Пользователи дольше ждут генерации или доставки результата.
          dashboard: Grafana -> Product Observability / Jobs Worker
          action: Проверь, жив ли worker; смотри queue depth/oldest age, provider latency/rate limits и Redis health; при необходимости подними дополнительный worker.
          safe_logs: Отправляй stream/phase, age, worker status; не отправляй prompt bodies или provider payloads.

      - alert: StuckJobsDetected
        expr: vkagg_stuck_jobs > 0
        for: 5m
        labels:
          severity: critical
          surface: jobs
        annotations:
          summary: Найдены зависшие jobs
          description: Jobs находятся в non-terminal state слишком долго.
          impact: Деньги могли быть зарезервированы, а результат не дошел до пользователя.
          dashboard: Grafana -> Product Observability / Jobs Worker, Payments Billing
          action: Проверь stuck job count, worker logs, reservation/capture/release path; не меняй balance вручную, используй ledger-safe путь.
          safe_logs: Отправляй job status, operation, modality и error class; не отправляй job id вместе с user data, prompts или private URLs.

      - alert: MediaProbeFailures
        expr: increase(vkagg_media_probe_results_total{result="error"}[10m]) > 0
        for: 0s
        labels:
          severity: critical
          surface: media
        annotations:
          summary: Media probe отклонил видео
          description: Worker получил ошибку probe при проверке provider video output или VK-ready variant.
          impact: "Видео job fail-closed: результат не доставляется и billing capture не должен происходить."
          dashboard: Grafana -> Product Observability / Jobs Worker
          action: Проверь Jobs Worker dashboard, labels operation/modality/error_class, наличие ffprobe и media config; не открывай raw provider payload или private artifact URL.
          safe_logs: Отправляй только operation, modality, result и error_class; не отправляй job_id, artifact_id, prompt, raw URL или storage key.

      - alert: MediaTranscodeFailures
        expr: increase(vkagg_media_transcode_results_total{result="error"}[10m]) > 0
        for: 0s
        labels:
          severity: critical
          surface: media
        annotations:
          summary: Media transcode не создал VK-ready variant
          description: Worker не смог подготовить безопасный video variant для VK delivery.
          impact: Raw provider video не должен доставляться; job завершается безопасной ошибкой без capture.
          dashboard: Grafana -> Product Observability / Jobs Worker
          action: Проверь ffmpeg path, timeout, CPU/disk pressure, media constraints и labels variant_type/error_class.
          safe_logs: Отправляй variant_type, operation, modality и error_class; не отправляй raw ffmpeg output с путями, private URLs, prompts или provider payloads.

      - alert: MediaVariantBacklogHigh
        expr: sum(vkagg_media_variant_backlog) > 5
        for: 10m
        labels:
          severity: warning
          surface: media
        annotations:
          summary: Media variant backlog высокий
          description: В worker долго остаются in-process video variant операции.
          impact: Видео delivery может задерживаться, CPU/IO могут быть перегружены.
          dashboard: Grafana -> Product Observability / Jobs Worker
          action: Проверь worker CPU/disk, очередь video jobs, ffmpeg timeouts и количество worker процессов; не запускай бесконтрольный параллельный transcode.
          safe_logs: Отправляй только aggregate backlog и bounded labels; не отправляй job/artifact ids, storage paths или prompts.

      - alert: MediaCleanupFailures
        expr: increase(vkagg_media_cleanup_deleted_total{result="error"}[30m]) > 0
        for: 0s
        labels:
          severity: warning
          surface: media
        annotations:
          summary: Media cleanup не смог удалить inactive object
          description: Maintenance cleanup получил ошибку удаления storage object или mark-deleted metadata.
          impact: Старые failed/deleted media могут занимать место дольше retention policy.
          dashboard: Grafana -> Product Observability / Jobs Worker, Infrastructure
          action: Проверь MinIO/S3 доступность, disk usage, ARTIFACT_RETENTION_DAYS и maintenance logs по error_class; не удаляй volumes без отдельного подтверждения.
          safe_logs: Отправляй result, variant_type и error_class; не отправляй bucket/key, private artifact URL, raw path или user data.

  - name: payments-billing
    rules:
      - alert: BillingMismatch
        expr: vkagg_billing_mismatches > 0
        for: 0s
        labels:
          severity: critical
          surface: billing
        annotations:
          summary: Найдено расхождение billing ledger
          description: Cached balance отличается от committed ledger projection.
          impact: Баланс пользователя может отображаться или списываться неверно.
          dashboard: Grafana -> Product Observability / Payments Billing
          action: Останови ручные billing changes; проверь ledger projection, recent topups/captures/refunds; исправляй только через ledger/reconciliation, не прямым UPDATE balance.
          safe_logs: Не отправляй user ids, payment ids, raw ledger rows или provider payloads; используй агрегаты и sanitized mismatch count.

      - alert: PaymentWebhookBacklog
        expr: payment_webhook_oldest_unprocessed_age_seconds > 300
        for: 1m
        labels:
          severity: critical
          surface: payments
        annotations:
          summary: Payment webhook inbox не разбирается
          description: Самый старый необработанный payment webhook старше 5 минут.
          impact: Успешные платежи могут не превратиться в ledger top-up вовремя.
          dashboard: Grafana -> Product Observability / Payments Billing
          action: Проверь cmd/provider-webhook readyz, payment_events backlog, доступ к provider GetPayment и DB; не начисляй кредиты по frontend redirect.
          safe_logs: Не отправляй raw webhook body, payment metadata, auth headers, shop id или secret key.

      - alert: PaymentReconciliationMismatch
        expr: payment_reconciliation_mismatches > 0
        for: 0s
        labels:
          severity: critical
          surface: payments
        annotations:
          summary: Reconciliation платежей нашел mismatch
          description: Provider state и local payment intent state не совпадают.
          impact: Платеж может быть зависшим, неверно отмененным или не зачисленным.
          dashboard: Grafana -> Product Observability / Payments Billing
          action: Проверь reconciliation logs и state machine; сверяй provider state через adapter, не через frontend; исправляй idempotent ledger-safe путем.
          safe_logs: Отправляй только counts/state names; не отправляй provider-native payload, payment id, user id или credentials.

      - alert: PaymentProviderErrors
        expr: increase(payment_provider_errors_total[10m]) > 0
        for: 0s
        labels:
          severity: critical
          surface: payments
        annotations:
          summary: Ошибки API платежного провайдера
          description: Payment provider API calls завершаются ошибкой.
          impact: Создание платежей, проверка webhook или reconciliation могут не работать.
          dashboard: Grafana -> Product Observability / Payments Billing
          action: Проверь provider-webhook logs, YooKassa/base URL доступность, rate limits и credentials presence; не печатай credential values.
          safe_logs: Отправляй provider name, operation и sanitized error class; не отправляй Basic Auth, shop id, secret key или raw provider response.

      - alert: RefundRollbackFailed
        expr: increase(payment_refunds_total{result="rollback_failed"}[5m]) > 0
        for: 0s
        labels:
          severity: critical
          surface: payments
        annotations:
          summary: Не удалось откатить refund
          description: Provider refund и internal compensation оба завершились ошибкой.
          impact: Деньги и внутренний баланс могут разойтись; ручные refunds опасны до разбора.
          dashboard: Grafana -> Product Observability / Payments Billing
          action: Заморозь ручные refunds; проверь refund operation, ledger compensation path и provider state; восстановление делай только через операторский idempotent flow.
          safe_logs: Не отправляй provider refund payload, payment id, user id, receipt data или credentials.

  - name: providers
    rules:
      - alert: ProviderErrorRateHigh
        expr: |
          sum(rate(vkagg_provider_errors_total[10m])) by (provider)
          /
          clamp_min(sum(rate(vkagg_provider_requests_total[10m])) by (provider), 1) > 0.05
        for: 10m
        labels:
          severity: warning
          surface: providers
        annotations:
          summary: Ошибки AI provider выше 5 процентов
          description: Provider non-success rate выше 5 процентов в течение 10 минут.
          impact: Генерации текста, изображений или видео могут падать или уходить во fallback.
          dashboard: Grafana -> Product Observability / Providers
          action: Проверь provider/model/operation/error_class; смотри rate limits, latency, circuit breaker и fallback; при необходимости переключи provider chain.
          safe_logs: Отправляй provider, model, operation, error class; не отправляй prompt, raw provider request/response, API key или private media URL.

      - alert: ProviderRateLimitDetected
        expr: increase(vkagg_provider_rate_limits_total[5m]) > 0
        for: 0s
        labels:
          severity: warning
          surface: providers
        annotations:
          summary: AI provider вернул rate limit
          description: Provider вернул rate-limit error.
          impact: Часть jobs может ждать retry, уйти во fallback или завершиться ошибкой при исчерпании retries.
          dashboard: Grafana -> Product Observability / Providers, Jobs Worker
          action: Проверь текущий provider quota/rate, fallback health и retry volume; при частом повторе снизь нагрузку или добавь provider в chain.
          safe_logs: Отправляй provider/model/error class; не отправляй prompt, API key, raw response или account details.

      - alert: ProviderFallbackExhausted
        expr: increase(vkagg_provider_fallback_total{reason="exhausted"}[5m]) > 0
        for: 0s
        labels:
          severity: critical
          surface: providers
        annotations:
          summary: Все AI provider fallback исчерпаны
          description: Все настроенные providers failed минимум для одного request.
          impact: Jobs могут становиться failed_terminal, пользователи не получают результат.
          dashboard: Grafana -> Product Observability / Providers, Jobs Worker
          action: Проверь provider chain, ключи, quota/rate limits и последние provider error classes; включи рабочий fallback перед повторной обработкой jobs.
          safe_logs: Отправляй provider list names и error classes; не отправляй keys, prompts или raw provider payloads.

  - name: infra-backups
    rules:
      - alert: PostgresExporterDown
        expr: up{job="postgres-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          surface: infra
        annotations:
          summary: Postgres exporter недоступен
          description: Prometheus не может прочитать Postgres exporter.
          impact: Мы теряем видимость состояния Postgres, но сама база может продолжать работать.
          dashboard: Grafana -> Product Observability / Infrastructure
          action: Проверь контейнер vk-ai-aggregator-postgres-exporter, DATA_SOURCE_NAME presence и доступ к postgres:5432; затем проверь Prometheus target.
          safe_logs: Не отправляй DSN целиком, DB password или connection string; отправляй только статус target и sanitized error.

      - alert: RedisExporterDown
        expr: up{job="redis-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          surface: infra
        annotations:
          summary: Redis exporter недоступен
          description: Prometheus не может прочитать Redis exporter.
          impact: Мы теряем видимость Redis queues/rate limits, но Redis может продолжать работать.
          dashboard: Grafana -> Product Observability / Infrastructure, Jobs Worker
          action: Проверь контейнер vk-ai-aggregator-redis-exporter, REDIS_ADDR presence и доступ к redis:6379; затем проверь Prometheus target.
          safe_logs: Не отправляй Redis password/DSN; отправляй только target status и sanitized error.

      - alert: DiskSpaceWarning
        expr: |
          1 - (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}
              /
            node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}
          ) > 0.80
        for: 10m
        labels:
          severity: warning
          surface: infra
        annotations:
          summary: Диск заполнен больше чем на 80 процентов
          description: Host disk usage выше warning threshold.
          impact: Docker volumes, Postgres, MinIO artifacts, logs или backups могут начать деградировать.
          dashboard: Grafana -> Product Observability / Infrastructure
          action: Найди mount/device в Grafana; проверь Docker volumes, logs, artifacts и backups; чистку делай только после понимания, что удаляешь.
          safe_logs: Отправляй mount/device и проценты; не отправляй paths с пользовательскими файлами или private artifact URLs.

      - alert: DiskSpaceCritical
        expr: |
          1 - (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}
              /
            node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}
          ) > 0.90
        for: 5m
        labels:
          severity: critical
          surface: infra
        annotations:
          summary: Диск заполнен больше чем на 90 процентов
          description: Host disk usage выше critical threshold.
          impact: Запись в Postgres/MinIO/logs может падать; jobs, payments и backups могут ломаться.
          dashboard: Grafana -> Product Observability / Infrastructure
          action: >
            Срочно освободи место: проверь logs, old artifacts,
            Docker images/containers и backup retention; не удаляй volumes
            с данными без отдельного подтверждения.
          safe_logs: Отправляй mount/device и проценты; не отправляй private paths, artifact URLs или содержимое пользовательских файлов.

      - alert: BackupStale
        expr: time() - vkagg_backup_last_success_timestamp > 86400
        for: 5m
        labels:
          severity: critical
          surface: backups
        annotations:
          summary: Последний успешный backup старше 24 часов
          description: Backup metrics не видит успешного backup за последние сутки.
          impact: При сбое данных может не быть свежей точки восстановления.
          dashboard: Grafana -> Product Observability / Infrastructure, Product Health
          action: Проверь backup job/script logs, место на диске, доступ к target storage и textfile metrics; не запускай destructive restore без отдельного подтверждения.
          safe_logs: Отправляй target name, timestamp и exit class; не отправляй backup credentials, full paths с приватными данными или dumps.
