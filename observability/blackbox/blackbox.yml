modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      method: GET
      preferred_ip_protocol: ip4
      follow_redirects: true
      valid_http_versions:
        - HTTP/1.1
        - HTTP/2.0
      valid_status_codes: []

  public_prometheus_metrics:
    prober: http
    timeout: 5s
    http:
      method: GET
      preferred_ip_protocol: ip4
      follow_redirects: true
      valid_http_versions:
        - HTTP/1.1
        - HTTP/2.0
      valid_status_codes: []
      fail_if_body_not_matches_regexp:
        - '(?m)^# HELP (vkagg_|payment_|go_|process_)'

  public_admin_route_closed:
    prober: http
    timeout: 5s
    http:
      method: GET
      preferred_ip_protocol: ip4
      follow_redirects: false
      valid_http_versions:
        - HTTP/1.1
        - HTTP/2.0
      valid_status_codes:
        - 301
        - 302
        - 303
        - 307
        - 308
        - 401
        - 403
        - 404
