name: vk-ai-aggregator

services:
  postgres:
    image: postgres:16-alpine
    container_name: vk-ai-aggregator-postgres
    environment:
      POSTGRES_DB: vk_ai_aggregator
      POSTGRES_USER: vk_ai_aggregator
      POSTGRES_PASSWORD: vk_ai_aggregator
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vk_ai_aggregator -d vk_ai_aggregator"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vk-ai-aggregator-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: vk-ai-aggregator-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
volumes:
  postgres_data:
  redis_data:
  minio_data:
