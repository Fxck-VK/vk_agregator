name: vk-ai-aggregator

services:
  postgres:
    image: postgres:16-alpine
    container_name: vk-ai-aggregator-postgres
    environment:
      POSTGRES_DB: vk_ai_aggregator
      POSTGRES_USER: vk_ai_aggregator
      POSTGRES_PASSWORD: vk_ai_aggregator
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vk_ai_aggregator -d vk_ai_aggregator"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vk-ai-aggregator-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: vk-ai-aggregator-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data

  provider-balance-bot:
    profiles:
      - provider-balance
    build:
      context: .
      dockerfile: Dockerfile.provider-balance-bot
    restart: on-failure
    environment:
      APP_ENV: ${APP_ENV:-development}
      PROVIDER_BALANCE_BOT_ENABLED: ${PROVIDER_BALANCE_BOT_ENABLED:-false}
      PROVIDER_BALANCE_POLL_INTERVAL: ${PROVIDER_BALANCE_POLL_INTERVAL:-15m}
      APIMART_BALANCE_WARN_REMAIN_BALANCE: ${APIMART_BALANCE_WARN_REMAIN_BALANCE:-20}
      APIMART_BALANCE_WARN_REMAIN_CREDITS: ${APIMART_BALANCE_WARN_REMAIN_CREDITS:-200}
      ALERT_TELEGRAM_BOT_TOKEN: ${ALERT_TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
      TELEGRAM_ADMIN_THREAD_ID: ${TELEGRAM_ADMIN_THREAD_ID:-}
      APIMART_API_KEY: ${APIMART_API_KEY:-}
      APIMART_BASE_URL: ${APIMART_BASE_URL:-https://api.apimart.ai/v1}
      POYO_PROVIDER_ENABLED: ${POYO_PROVIDER_ENABLED:-false}
      POYO_API_KEY: ${POYO_API_KEY:-}
      POYO_BASE_URL: ${POYO_BASE_URL:-https://api.poyo.ai}
      RUNWAY_PROVIDER_ENABLED: ${RUNWAY_PROVIDER_ENABLED:-false}
      RUNWAYML_API_SECRET: ${RUNWAYML_API_SECRET:-}
      RUNWAYML_BASE_URL: ${RUNWAYML_BASE_URL:-https://api.dev.runwayml.com/v1}
      DEEPINFRA_BALANCE_PROVIDER_ENABLED: ${DEEPINFRA_BALANCE_PROVIDER_ENABLED:-false}
      DEEPINFRA_API_KEY: ${DEEPINFRA_API_KEY:-}
      DEEPINFRA_BALANCE_BASE_URL: ${DEEPINFRA_BALANCE_BASE_URL:-https://api.deepinfra.com}
volumes:
  postgres_data:
  redis_data:
  minio_data:
