name: Docker Images

on:
  pull_request:
    branches:
      - main
      - serega
      - feature/integration-web-backend
      - integration-web-backend
      - integration_web_backend
      - dev-deploy
  push:
    branches:
      - main
      - serega
      - feature/integration-web-backend
      - integration-web-backend
      - integration_web_backend
      - dev-deploy
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: Dockerfile.api
          - service: worker
            dockerfile: Dockerfile.worker
          - service: provider-webhook
            dockerfile: Dockerfile.provider-webhook
          - service: miniapp
            dockerfile: Dockerfile.miniapp
          - service: migrate
            dockerfile: Dockerfile.migrate
          - service: backup
            dockerfile: Dockerfile.backup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image namespace
        shell: bash
        run: echo "IMAGE_NAMESPACE=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
